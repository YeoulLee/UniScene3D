# Experiment general info
name: "OV_SQA3D_QWEN"
rng_seed: 42
num_gpu: 1                 # overridden by launch.py --gpu_per_node
mode: "train"
note: ""
naming_keywords: ["dataloader.batchsize", "task", "note", "time"]
base_dir: "results"
exp_dir: ""

resume: False
ckpt_path: ""           # set via CLI for eval-only runs (mode=test)

debug:
  flag: False
  hard_debug: False
  debug_size: 20

logger:
  name: "wandb"
  entity: "yem"

# dataset details
data:
  train: ['ScanNetSQA3DGen']
  val: ['ScanNetSQA3DGen']
  test: ['ScanNetSQA3DGen']
  ScanNetSQA3DGen:
    train:
      use_unanswer: True
    val:
      use_unanswer: True
    test:
      use_unanswer: True
  scan_family_base: "dataset/ScanNet"

# task details
task: 'SQA3D'
data_wrapper:
  train: 'ScanFamilyDatasetWrapperQA'
  val: 'ScanFamilyDatasetWrapperQA'
  test: 'ScanFamilyDatasetWrapperQA'

# Training details
trainer: "Qwen3DTrainer"
# 3D-pretrained UniScene3D checkpoint; load_pretrain loads its pm_encoder.* weights.
# Blank this string to run with the raw FG-CLIP encoder instead.
pretrain_ckpt_path: "results/sceneverse_scannet_exp1_b16_Pretrain_all_scannet_training_run1/cur_best_v1/ckpt/ckpt_15.pth"

# dataloader details
dataloader:
  batchsize: 4             # per-GPU; tune up once first-run memory is known
  num_workers: 4

solver:
  gradient_accumulation_steps: 1
  epochs_per_save: 100     # only latest.pth / best.pth saved within this run
  epochs_per_eval: 1
  lr: 2e-5                 # full fine-tuning of the Qwen LLM (projector_lr is separate)
  grad_norm: 1.0
  epochs: 5
  optim:
    name: "AdamW"
    args:
      betas: [0.9, 0.98]
  sched:
    name: "warmup_cosine"
    args:
      warmup_steps: 200

eval:
  name: "SQA3DGenEval"
  save: False

# Model details
model:
  name: UniScene3DQwen
  qwen_model_path: "src/Qwen3.5-4B"
  voxel_size: 0.2
  num_visual_tokens: 512
  max_new_tokens: 16
  use_vision: True         # False = text-only baseline (no visual tokens)
  qwen_tuning: "full"      # "full" | "lora" | "frozen"
  gradient_checkpointing: True
  projector_lr: 1e-3       # projector trains faster than the LLM
  lora:                    # used only when qwen_tuning: "lora"
    r: 16
    alpha: 32
    dropout: 0.05
  loss_list: []            # model computes the causal-LM loss internally
  vis_loss_list: []
